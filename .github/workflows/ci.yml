name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check python/ tests/ scripts/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Validate dataset
        run: onkos validate
      - name: Run tests
        run: pytest -q
      - name: Execute notebooks (nbmake)
        run: pytest --nbmake notebooks/ -q
      - name: Dataset health report is in sync
        run: |
          onkos report --output /tmp/report.md
          diff -u docs/dataset-health.md /tmp/report.md

  exports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Regenerate all exports (must not error)
        run: |
          for fmt in nonmem sbml pharmml so rxode2 pumas vt-json jsonld omex csv bibtex; do
            onkos export --format "$fmt" --output "exports/$fmt"
          done
      - name: Regenerate README figures
        run: python scripts/make_figures.py
      - uses: actions/upload-artifact@v4
        with:
          name: onkos-exports
          path: exports/

  release:
    name: releasable wheel (bundled dataset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - name: Sync dataset into the package and build the wheel
        run: |
          python scripts/sync_dataset_into_package.py
          python -m build --wheel
      - name: Install the wheel into a clean environment and run from outside the repo
        run: |
          python -m venv /tmp/clean
          /tmp/clean/bin/pip install dist/*.whl
          cd /tmp                                  # no source dataset/ on the path here
          /tmp/clean/bin/onkos validate
          /tmp/clean/bin/onkos info
          /tmp/clean/bin/onkos report > /dev/null
          /tmp/clean/bin/python -c "import onkos, numpy as np; ds=onkos.load(); assert len(ds)>=33; onkos.simulate(ds,'resistance.claret_2009.tgi',context={'tumor_type':'NSCLC','line':'first'})"
      - uses: actions/upload-artifact@v4
        with:
          name: onkos-wheel
          path: dist/*.whl
