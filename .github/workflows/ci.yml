name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check python/ tests/ scripts/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Validate dataset
        run: onkos validate
      - name: Run tests
        run: pytest -q
      - name: Execute notebooks (nbmake)
        run: pytest --nbmake notebooks/ -q

  exports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Regenerate all exports (must not error)
        run: |
          for fmt in nonmem sbml pharmml rxode2 pumas vt-json omex csv bibtex; do
            onkos export --format "$fmt" --output "exports/$fmt"
          done
      - name: Regenerate README figures
        run: python scripts/make_figures.py
      - uses: actions/upload-artifact@v4
        with:
          name: onkos-exports
          path: exports/
